spring:
  application:
    name: gateway
  cloud:
    gateway:
      server:
        webflux:
          routes:
            # Route for Login/Signup (No Filter)
            - id: auth-service
              uri: http://localhost:8081
              predicates:
                - Path=/auth/**

            # Route for Events (Filter Active!)
            - id: event-service
              uri: http://localhost:8082
              predicates:
                - Path=/events/**, /seats/**, /timeslots/**
              filters:
                - name: JwtAuthenticationFilter


server:
  port: 8080

logging:
  file:
    path: ${LOG_PATH}
